<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="calculator.css">
</head>

<body>
  <div class="container">
    <div class="calculator">
    <input type="text" id="display1" readonly>
    <input type="text" id="display2" readonly>
    <button class="boxx" id="clear">AC</button>
    <button class="boxx" id="del">DEL</button>
    <button class="box" id="sqrt">√</button>
    <button class="box" id="mod">%</button><br>
    <button class="box" id="seven">7</button>
    <button class="box" id="eight">8</button>
    <button class="box" id="nine">9</button>
    <button class="box" id="divide">÷</button><br>
    <button class="box" id="four">4</button>
    <button class="box" id="five">5</button>
    <button class="box" id="six">6</button>
    <button class="box" id="mul">×</button><br>
    <button class="box" id="one">1</button>
    <button class="box" id="two">2</button>
    <button class="box" id="three">3</button>
    <button class="box" id="sub">-</button><br>
    <button class="box" id="zero">0</button>
    <button class="box" id="dot">•</button>
    <button class="box" id="add">+</button>
    <button class="boxx" id="equals">=</button>
    </div>
  </div>
    <script src="script.js"></script>

  <body>
</html>
